<p>vaults-list-table works!</p>
<table class="table table-striped">
  <thead>
  <tr>
    <th>Title</th>
    <th>Actions</th>
  </tr>
  </thead>
  <tbody>
  <tr *ngFor="let vault of paginatedVaultsResponse.data; let i = index ">

      <button class="btn btn-danger">Delete</button>
    </td>
  </tr>
  </tbody>
</table>
