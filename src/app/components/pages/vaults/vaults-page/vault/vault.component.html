<div class="controls d-flex justify-content-end gap-3">
  <button class="btn btn-primary">Edit</button>
  <button class="btn btn-danger">Delete</button>
</div>

<hr />

<div *ngIf="vault$ | async as vault" class="vault-content">
  <h3>Vault name: {{ vault.name }}</h3>

  <h3>Vault Description</h3>
  <p>
    {{ vault.description }}
  </p>


  <h3>Password list</h3>

  <app-password-list-table [passwordList]="vault.passwords"></app-password-list-table>
</div>
