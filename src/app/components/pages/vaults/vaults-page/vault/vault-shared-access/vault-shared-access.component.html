<h4>Accessed users lists</h4>

<app-search (search)="getSearchValue($event)" customClass="w-50 mt-3 mb-3"></app-search>
<table class="table table-striped">
  <thead>
  <tr>
    <th>Username</th>
    <th>Actions</th>
  </tr>
  </thead>
  <tbody>
  <tr *ngFor="let user of notAccessedUsers$ | async">
    <td>{{ user.name }}</td>
    <td>
      <button class="btn btn-success">Add Access</button>
    </td>
  </tr>
  </tbody>
</table>
